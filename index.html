<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>समसामयिकी · Current Affairs Notes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@500;600;700&family=Mukta:wght@700;800;900&family=Noto+Sans+Devanagari:wght@700;800;900&family=Poppins:wght@600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A4;
            margin: 0;
        }

        body {
            font-family: 'Hind', sans-serif;
            background: #d9cdb8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* ---- editor panel ---- */
        .editor-panel {
            width: 100%;
            max-width: 820px;
            background: #1f1b14;
            color: #f3ead9;
            padding: 24px 28px;
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        }
        .editor-panel h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #f0c66a;
            margin-bottom: 4px;
        }
        .editor-panel .sub {
            font-size: 14px;
            color: #b8a88a;
            margin-bottom: 18px;
            border-left: 4px solid #d9772a;
            padding-left: 14px;
        }
        .editor-panel label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #d9772a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 16px 0 6px;
        }
        .editor-panel input[type="text"],
        .editor-panel textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #3d3523;
            background: #2f281b;
            color: #fffaf0;
            font-family: 'Hind', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            transition: 0.2s;
        }
        .editor-panel input[type="text"]:focus,
        .editor-panel textarea:focus {
            outline: 2px solid #d9772a;
            background: #3b3222;
        }
        .editor-panel textarea {
            height: 320px;
            resize: vertical;
        }
        .editor-panel .hint {
            background: #2f281b;
            padding: 14px 18px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.7;
            color: #c9bfa5;
            border-left: 5px solid #d9772a;
        }
        .editor-panel .hint b {
            color: #f3ead9;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0 10px;
            font-size: 15px;
            color: #f0c66a;
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 40px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            background: #3d3523;
            color: #f3ead9;
            transition: 0.2s;
            flex: 1 1 auto;
        }
        .btn-primary {
            background: #d9772a;
            color: #fff;
            box-shadow: 0 8px 18px rgba(217, 119, 42, 0.3);
        }
        .btn-primary:hover {
            filter: brightness(1.1);
        }
        .btn-secondary {
            background: #3d3523;
            border: 1px solid #5f4f33;
        }
        .btn-secondary:hover {
            background: #5a4a31;
        }

        /* ---- preview container ---- */
        .preview-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            width: 100%;
            max-width: 1200px;
        }

        /* ---- each A4 sheet (exact physical size) ---- */
        .a4-sheet {
            width: 210mm;
            height: 297mm;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
            border-radius: 6px;
            background: #fffaf0;
            overflow: hidden;
        }

        /* internal page scaling: 1000px width → 210mm */
        .page {
            width: 1000px;
            height: 1414px;
            background: #fffaf0;
            transform: scale(0.79370079);
            transform-origin: top left;
            padding: 68px 62px 74px;
            position: relative;
            overflow: hidden;
            border: 4px solid #b85c1a;
            border-radius: 6px;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* brass corner ornaments */
        .corner {
            position: absolute;
            width: 92px;
            height: 92px;
            z-index: 12;
            pointer-events: none;
        }
        .corner-tl { top: 28px; left: 28px; }
        .corner-tr { top: 28px; right: 28px; transform: scaleX(-1); }
        .corner-bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
        .corner-br { bottom: 28px; right: 28px; transform: scale(-1, -1); }

        .corner svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 8px rgba(120, 60, 20, 0.3));
        }

        /* page badge */
        .page-badge {
            position: absolute;
            top: 28px;
            right: 30px;
            z-index: 15;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 15px;
            color: #8c4a1f;
            background: #f3e6c8;
            padding: 8px 22px;
            border-radius: 40px;
            box-shadow: 0 4px 12px rgba(140, 74, 31, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.7);
            letter-spacing: 1.2px;
        }

        /* header */
        .header {
            text-align: center;
            padding-bottom: 18px;
            margin-bottom: 32px;
            border-bottom: 4px solid #d9772a;
            position: relative;
            z-index: 5;
            flex-shrink: 0;
        }
        .main-title {
            font-family: 'Mukta', 'Noto Sans Devanagari', sans-serif;
            font-size: 56px;
            font-weight: 900;
            color: #1f1d18;
            letter-spacing: -0.5px;
            line-height: 1.1;
            text-shadow: 0 2px 4px rgba(140, 74, 31, 0.1);
        }
        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #b85c1a;
            letter-spacing: 4px;
            margin-top: 6px;
        }
        .header-rule {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .header-rule .line {
            width: 160px;
            height: 3px;
            border-radius: 4px;
            background: linear-gradient(90deg, transparent, #d9772a, transparent);
        }
        .header-rule .dot {
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 35% 30%, #f2b25a, #b85c1a 70%);
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(140, 74, 31, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        /* body content area (flexible) */
        .body-content {
            flex: 1 0 auto;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* section title */
        .section-title {
            font-family: 'Mukta', 'Noto Sans Devanagari', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #1f1d18;
            padding: 14px 26px;
            background: linear-gradient(90deg, #f8f1e3, #e8d9b8);
            border-left: 10px solid #d9772a;
            margin: 16px 0 18px 0;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 4px 10px rgba(184, 92, 26, 0.12);
        }

        /* news card */
        .news-item {
            background: #ffffff;
            padding: 18px 26px 16px 26px;
            margin-bottom: 16px;
            border-radius: 14px;
            border-left: 8px solid #b85c1a;
            box-shadow: 0 8px 20px rgba(184, 92, 26, 0.12), 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: 0.1s;
        }
        .news-item h3 {
            font-family: 'Mukta', 'Noto Sans Devanagari', sans-serif;
            font-size: 23px;
            font-weight: 900;
            color: #1f1d18;
            margin-bottom: 10px;
        }
        .news-list {
            list-style: none;
            padding-left: 6px;
            line-height: 1.8;
            font-size: 18px;
            font-weight: 600;
        }
        .news-list li {
            position: relative;
            padding-left: 26px;
            margin-bottom: 6px;
        }
        .news-list li::before {
            content: "◆";
            position: absolute;
            left: 0;
            top: 2px;
            font-size: 11px;
            color: #d9772a;
        }
        .news-list b {
            color: #b85c1a;
            font-weight: 900;
        }

        /* question-answer block */
        .qa-block {
            background: #ffffff;
            padding: 18px 26px 20px 26px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 2px solid #e8d9b8;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        }
        .q-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: radial-gradient(circle at 35% 30%, #f0a05a, #b85c1a 75%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 19px;
            border-radius: 50%;
            box-shadow: 0 6px 14px rgba(184, 92, 26, 0.35), inset 0 2px 3px rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
        }
        .q-text {
            font-size: 19px;
            font-weight: 800;
            color: #1f1d18;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .a-pill {
            display: inline-block;
            background: #fbf1dc;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 700;
            color: #3a352b;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 4px 10px rgba(140, 74, 31, 0.1);
        }
        .a-pill b {
            color: #a63d2c;
            font-weight: 900;
        }

        /* footer */
        .footer {
            flex-shrink: 0;
            text-align: center;
            padding-top: 20px;
            margin-top: 10px;
            border-top: 3px solid #d9c8a8;
        }
        .footer .plate {
            display: inline-block;
            background: linear-gradient(180deg, #26456a, #1c3552);
            padding: 12px 38px;
            border-radius: 40px;
            font-family: 'Mukta', sans-serif;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #f0c66a;
            box-shadow: 0 8px 20px rgba(28, 53, 82, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* responsive / print tweaks */
        @media print {
            body {
                background: #fff;
                padding: 0;
                gap: 0;
            }
            .editor-panel {
                display: none;
            }
            .preview-wrap {
                gap: 0;
                max-width: 100%;
            }
            .a4-sheet {
                box-shadow: none;
                border-radius: 0;
                margin: 0;
                page-break-after: always;
            }
            .page {
                border: 4px solid #b85c1a;
                transform: scale(1);
                width: 210mm;
                height: 297mm;
                padding: 20mm 18mm 22mm;
                border-radius: 0;
            }
            .corner {
                width: 70px;
                height: 70px;
            }
            .corner-tl { top: 14px; left: 14px; }
            .corner-tr { top: 14px; right: 14px; }
            .corner-bl { bottom: 14px; left: 14px; }
            .corner-br { bottom: 14px; right: 14px; }
            .page-badge {
                top: 14px;
                right: 16px;
                font-size: 12px;
                padding: 5px 16px;
            }
            .main-title { font-size: 44px; }
            .subtitle { font-size: 18px; }
            .section-title { font-size: 24px; }
            .news-item h3 { font-size: 20px; }
            .news-list { font-size: 16px; }
            .q-text { font-size: 17px; }
            .a-pill { font-size: 15px; }
            .footer .plate { font-size: 14px; padding: 10px 28px; }
        }
    </style>
</head>
<body>

<!-- editor panel -->
<div class="editor-panel">
    <h2>📋 समसामयिकी · बुलेटिन जनरेटर</h2>
    <div class="sub">Plain text डालें, स्टाइलिश A4 pages अपने-आप बनेंगे</div>

    <label>📌 Subtitle (header)</label>
    <input type="text" id="subtitleInput" value="JUNE 2026 • PART - 2">

    <label>📌 Footer text</label>
    <input type="text" id="footerInput" value="KULDEEP BISHNOI • RAS PRE + MAINS PREPARATION">

    <label>📝 Content (news + Q&A)</label>
    <textarea id="rawInput">SECTION: महत्वपूर्ण समाचार बुलेट्स

NEWS: राजस्थान सौर ऊर्जा नीति 2026
- **30 GW** उत्पादन लक्ष्य निर्धारित
- **5000 करोड़** रुपये का निवेश प्रस्तावित
- किसानों को **60% सब्सिडी** दी जाएगी

NEWS: राष्ट्रीय आर्थिक अपडेट
- GDP वृद्धि दर **7.2%** दर्ज की गई
- FDI (विदेशी निवेश) में **18%** की बढ़ोतरी
- नई MSME नीति जारी

NEWS: राजस्थान बजट 2026-27 मुख्य घोषणाएँ
- शिक्षा क्षेत्र में **18%** बढ़ोतरी
- महिला सशक्तिकरण के लिए नई योजनाएँ
- सौर ऊर्जा पर विशेष फोकस

SECTION: प्रैक्टिस प्रश्न

Q: राजस्थान सरकार की नई सौर नीति का लक्ष्य क्या है?
A: 30 GW सौर ऊर्जा उत्पादन

Q: वर्तमान में भारत का GDP वृद्धि दर कितना है?
A: 7.2%</textarea>

    <div class="hint">
        <b>नियम:</b> <br>
        <b>SECTION:</b> नया heading · <b>NEWS:</b> नया news card · <b>-</b> bullet point <br>
        <b>Q:</b> / <b>A:</b> प्रश्न-उत्तर · <b>**text**</b> = bold highlight <br>
        जितना content होगा, उतने pages बनेंगे – हर page का layout एक जैसा।
    </div>

    <div class="status-bar">
        <span id="pageStatus">📄 Pages: 0</span>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="window.print()">🖨️ Print / PDF</button>
            <button class="btn btn-secondary" onclick="downloadHTML()">⬇️ Download HTML</button>
        </div>
    </div>
</div>

<!-- preview container -->
<div class="preview-wrap" id="previewWrap"></div>

<script>
    // ----- helper: escape & inline bold -----
    function esc(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function boldify(str) {
        return esc(str).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
    }

    // ----- corner SVG (brass) -----
    const CORNER_SVG = `
        <svg viewBox="0 0 100 100">
            <defs>
                <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f2c07a" />
                    <stop offset="55%" stop-color="#d9772a" />
                    <stop offset="100%" stop-color="#8c4a1f" />
                </linearGradient>
            </defs>
            <path d="M 12 88 V 28 Q 12 12 28 12 H 88" fill="none" stroke="url(#brass)" stroke-width="6" stroke-linecap="round" />
            <circle cx="24" cy="24" r="6" fill="url(#brass)" />
        </svg>
    `;

    // ----- build corner elements -----
    function cornersHTML() {
        return `
            <div class="corner corner-tl">${CORNER_SVG}</div>
            <div class="corner corner-tr">${CORNER_SVG}</div>
            <div class="corner corner-bl">${CORNER_SVG}</div>
            <div class="corner corner-br">${CORNER_SVG}</div>
        `;
    }

    // ----- header + footer -----
    function headerHTML(subtitle, pageNum, total) {
        return `
            <div class="page-badge">PAGE ${pageNum}${total ? ' / ' + total : ''}</div>
            <div class="header">
                <div class="main-title">समसामयिकी</div>
                <div class="subtitle">${esc(subtitle)}</div>
                <div class="header-rule">
                    <span class="line"></span>
                    <span class="dot"></span>
                    <span class="line"></span>
                </div>
            </div>
        `;
    }

    function footerHTML(text) {
        return `<div class="footer"><span class="plate">${esc(text)}</span></div>`;
    }

    // ----- full page shell (without body content) -----
    function pageShell(subtitle, footerText, pageNum, totalPages, bodyHTML) {
        return `
            <div class="a4-sheet">
                <div class="page">
                    ${cornersHTML()}
                    ${headerHTML(subtitle, pageNum, totalPages)}
                    <div class="body-content">${bodyHTML}</div>
                    ${footerHTML(footerText)}
                </div>
            </div>
        `;
    }

    // ----- parse raw text into block-HTML array (unsplittable) -----
    function parseBlocks(raw) {
        const lines = raw.split('\n');
        const blocks = [];
        let current = null;  // { kind:'news'|'qa', title?, bullets?, q?, a?, num? }

        function closeCurrent() {
            if (!current) return;
            if (current.kind === 'news') {
                const bullets = current.bullets.map(b => `<li>${boldify(b)}</li>`).join('');
                blocks.push(`
                    <div class="news-item">
                        <h3>${esc(current.title)}</h3>
                        <ul class="news-list">${bullets}</ul>
                    </div>
                `);
            } else if (current.kind === 'qa') {
                const ansHTML = current.a ? `<div class="a-pill"><b>उत्तर:</b> ${boldify(current.a)}</div>` : '';
                blocks.push(`
                    <div class="qa-block">
                        <div class="q-badge">${current.num}</div>
                        <div class="q-text">${boldify(current.q)}</div>
                        ${ansHTML}
                    </div>
                `);
            }
            current = null;
        }

        let qCounter = 0;

        for (let line of lines) {
            const t = line.trim();
            if (!t) continue;

            if (t.startsWith('SECTION:')) {
                closeCurrent();
                const title = t.replace('SECTION:', '').trim();
                blocks.push(`<div class="section-title">${esc(title)}</div>`);
            }
            else if (t.startsWith('NEWS:')) {
                closeCurrent();
                const title = t.replace('NEWS:', '').trim();
                current = { kind: 'news', title, bullets: [] };
            }
            else if (t.startsWith('-')) {
                if (current && current.kind === 'news') {
                    current.bullets.push(t.replace(/^-/, '').trim());
                }
            }
            else if (t.startsWith('Q:')) {
                closeCurrent();
                qCounter++;
                const num = String(qCounter).padStart(2, '0');
                const qText = t.replace('Q:', '').trim();
                current = { kind: 'qa', num, q: qText, a: '' };
            }
            else if (t.startsWith('A:')) {
                if (current && current.kind === 'qa') {
                    current.a = t.replace('A:', '').trim();
                }
            }
        }
        closeCurrent();
        return blocks;
    }

    // ----- paginate using a hidden measuring page (exact same style) -----
    function paginate(blocks, subtitle, footerText) {
        const measureHost = document.createElement('div');
        measureHost.style.position = 'absolute';
        measureHost.style.left = '-9999px';
        measureHost.style.top = '0';
        measureHost.style.width = '210mm';
        measureHost.style.height = '297mm';
        measureHost.innerHTML = pageShell(subtitle, footerText, 1, null, '');
        document.body.appendChild(measureHost);

        const mFrame = measureHost.querySelector('.a4-sheet');
        const mPage = mFrame.querySelector('.page');
        const mHeader = mPage.querySelector('.header');
        const mFooter = mPage.querySelector('.footer');
        const mBody = mPage.querySelector('.body-content');

        // compute available height for body content
        const pageStyle = getComputedStyle(mPage);
        const padTop = parseFloat(pageStyle.paddingTop);
        const padBottom = parseFloat(pageStyle.paddingBottom);
        const totalHeight = mPage.clientHeight;
        const headerH = mHeader.offsetHeight;
        const footerH = mFooter.offsetHeight;
        const gap = 18; // margin between elements
        const budget = totalHeight - padTop - padBottom - headerH - footerH - gap * 2;

        const pages = [];
        let currentBatch = [];

        for (let block of blocks) {
            mBody.innerHTML = currentBatch.concat([block]).join('');
            // force reflow
            void mBody.offsetHeight;
            if (mBody.scrollHeight > budget && currentBatch.length > 0) {
                pages.push(currentBatch.join(''));
                currentBatch = [block];
            } else {
                currentBatch.push(block);
            }
        }
        if (currentBatch.length) pages.push(currentBatch.join(''));
        if (pages.length === 0) pages.push('');

        document.body.removeChild(measureHost);
        return pages;
    }

    // ----- render all pages into preview -----
    function render() {
        const subtitle = document.getElementById('subtitleInput').value;
        const footerText = document.getElementById('footerInput').value;
        const raw = document.getElementById('rawInput').value;

        const blocks = parseBlocks(raw);
        const pageHTMLs = paginate(blocks, subtitle, footerText);

        const wrap = document.getElementById('previewWrap');
        wrap.innerHTML = '';

        pageHTMLs.forEach((bodyHTML, idx) => {
            const total = pageHTMLs.length;
            const html = pageShell(subtitle, footerText, idx + 1, total, bodyHTML);
            wrap.insertAdjacentHTML('beforeend', html);
        });

        document.getElementById('pageStatus').textContent =
            `📄 Pages: ${pageHTMLs.length} (${pageHTMLs.length === 1 ? '1 page' : pageHTMLs.length + ' pages'})`;
    }

    // ----- download HTML -----
    function downloadHTML() {
        const wrap = document.getElementById('previewWrap').cloneNode(true);
        const styles = document.querySelector('style').outerHTML;
        const doc = `<!DOCTYPE html>
        <html lang="hi">
        <head><meta charset="UTF-8"><title>समसामयिकी · Current Affairs</title>${styles}
        <style>body{background:#d9cdb8;display:flex;flex-direction:column;align-items:center;gap:48px;padding:40px 20px;}</style>
        </head><body>${wrap.innerHTML}</body></html>`;
        const blob = new Blob([doc], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'current-affairs-notes.html';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ----- bind events -----
    document.getElementById('rawInput').addEventListener('input', render);
    document.getElementById('subtitleInput').addEventListener('input', render);
    document.getElementById('footerInput').addEventListener('input', render);

    // initial render
    render();
</script>
