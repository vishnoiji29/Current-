<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>News Bulletin Generator</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Hind:wght@500;600;700&family=Mukta:wght@700;800;900&family=Poppins:wght@600;700;800&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    body{
        font-family:'Hind',sans-serif;
        background:#eee6d4;
        display:flex;
        min-height:100vh;
    }

    /* ============ LEFT: EDITOR PANEL ============ */
    .editor{
        width:400px; flex-shrink:0;
        background:#211c15; color:#f3ead9;
        padding:22px 20px; overflow-y:auto;
        height:100vh; position:sticky; top:0;
    }
    .editor h1{ font-family:'Poppins',sans-serif; font-size:18px; margin-bottom:4px; }
    .editor .sub{ font-size:12px; color:#c99a3d; margin-bottom:16px; }
    .editor label{ font-size:12px; font-weight:700; color:#d9772a; display:block; margin:14px 0 6px; text-transform:uppercase; letter-spacing:1px; }
    .editor input[type=text], .editor textarea{
        width:100%; padding:9px 10px; border-radius:6px; border:none;
        background:#37301f; color:#fffaf0; font-family:'Hind',sans-serif; font-size:14px;
    }
    .editor textarea{ height:380px; line-height:1.6; resize:vertical; }
    .editor .help{
        margin-top:14px; font-size:12px; line-height:1.7; color:#c9bfa5;
        background:#2b2519; padding:12px 14px; border-radius:8px; border-left:3px solid #d9772a;
    }
    .btn-row{ display:flex; gap:10px; margin-top:18px; }
    .btn{ flex:1; padding:11px 8px; border:none; border-radius:8px; font-family:'Poppins',sans-serif; font-weight:700; font-size:13px; cursor:pointer; }
    .btn.primary{ background:#d9772a; color:#fff; }
    .btn.secondary{ background:#3a3221; color:#f3ead9; border:1px solid #55492e; }
    .btn:hover{ filter:brightness(1.08); }

    /* ============ RIGHT: PREVIEW (Letter Size - Fully Optimized) ============ */
    .preview-wrap{ flex:1; display:flex; justify-content:center; padding:30px 20px; overflow-y:auto; height:100vh; }

    .page{
        width:216mm;
        min-height:279mm;
        background:#fffaf0;
        position:relative;
        padding:50px 46px 48px;
        border:5px solid #8c4a1f;
        box-shadow:0 25px 70px rgba(0,0,0,0.32);
        display:flex;
        flex-direction:column;
    }

    .corner-accent{ 
        position:absolute; width:108px; height:108px; 
        border:5px solid #d9772a; z-index:10; border-radius:22px;
    }
    .tl{ top:27px; left:27px; border-bottom:none; border-right:none; }
    .tr{ top:27px; right:27px; border-bottom:none; border-left:none; }
    .bl{ bottom:27px; left:27px; border-top:none; border-right:none; }
    .br{ bottom:27px; right:27px; border-top:none; border-left:none; }

    .header{ 
        text-align:center; 
        padding-bottom:20px; 
        margin-bottom:32px; 
        border-bottom:5px solid #d9772a; 
    }
    .main-title{ 
        font-family:'Mukta',sans-serif; 
        font-size:54px; 
        font-weight:900; 
        color:#1f1d18; 
        letter-spacing:-1px;
    }
    .subtitle{ 
        font-family:'Poppins',sans-serif; 
        font-size:19.5px; 
        font-weight:900; 
        color:#b85c1a; 
        letter-spacing:4.5px; 
        margin-top:8px; 
    }

    .section-title{
        font-family:'Mukta',sans-serif; 
        font-size:27px; 
        font-weight:900; 
        color:#1f1d18;
        padding:14px 26px; 
        background:linear-gradient(90deg,#f8f1e3,#e8d9b8);
        border-left:9px solid #d9772a; 
        margin:30px 0 18px;
    }

    .news-item, .question{
        background:#fff; 
        padding:17px 24px; 
        margin-bottom:18px; 
        border-radius:12px;
        box-shadow:0 6px 16px rgba(184,92,26,0.13);
        break-inside: avoid !important;
        page-break-inside: avoid !important;
    }
    .news-item{ border-left:7px solid #b85c1a; }
    .question{ border:2.5px solid #e8d9b8; }

    .news-item h3{ 
        font-family:'Mukta',sans-serif; 
        font-size:20.5px; 
        font-weight:900; 
        color:#1f1d18; 
        margin-bottom:10px; 
    }
    .news-list{ 
        padding-left:18px; 
        line-height:1.65; 
        font-size:16.4px; 
    }
    .news-list li{ margin-bottom:6px; }
    .news-list b{ color:#b85c1a; }

    .q-number{
        display:inline-flex; align-items:center; justify-content:center;
        width:39px; height:39px; 
        background:linear-gradient(145deg,#e08a3e,#b85c1a);
        color:#fff; font-family:'Poppins',sans-serif; font-weight:900; font-size:17px;
        border-radius:50%; margin-bottom:10px;
    }
    .q-text{ 
        font-size:16.4px; 
        font-weight:700; 
        color:#241f18; 
        margin-bottom:10px; 
        line-height:1.48;
    }
    .a-pill{ 
        display:inline-block; 
        background:#f8f1e3; 
        border-left:4px solid #d9772a; 
        padding:8px 15px; 
        border-radius:6px; 
        font-size:15px; 
        font-weight:600; 
        color:#3a352b; 
    }

    .footer{
        margin-top:auto; 
        padding-top:32px; 
        text-align:center;
        font-family:'Mukta',sans-serif; 
        font-weight:900; 
        font-size:15.8px; 
        color:#8c4a1f;
        border-top:2px solid #d9c9a8;
    }

    /* Print Settings */
    @media print{
        body{ background:#fff; }
        .editor{ display:none; }
        .preview-wrap{ padding:0; }
        .page{ 
            box-shadow:none; 
            margin:0; 
            width:100%; 
            min-height:100%; 
            break-after: page;
        }
        @page{ 
            size: letter; 
            margin: 0.35in 0.4in; 
        }
    }
</style>
</head>
<body>

<div class="editor">
    <h1>📋 News Bulletin Generator</h1>
    <div class="sub">Plain text daalo → design apne aap ban jayega</div>

    <label>Subtitle (top strip)</label>
    <input type="text" id="subtitleInput" value="JUNE 2026 • PART - 2">

    <label>Footer text</label>
    <input type="text" id="footerInput" value="KULDEEP BISHNOI • RAS PRE + MAINS PREPARATION">

    <label>News / Questions text</label>
    <textarea id="rawInput">SECTION: महत्वपूर्ण समाचार बुलेट्स

NEWS: राजस्थान सौर ऊर्जा नीति 2026
- **30 GW** उत्पादन लक्ष्य निर्धारित
- **5000 करोड़** रुपये का निवेश प्रस्तावित
- किसानों को **60% सब्सिडी** दी जाएगी

NEWS: राष्ट्रीय आर्थिक अपडेट
- GDP वृद्धि दर **7.2%** दर्ज की गई
- FDI (विदेशी निवेश) में **18%** की बढ़ोतरी
- नई MSME नीति जारी

NEWS: राजस्थान बजट 2026-27 मुख्य घोषणाएँ
- शिक्षा क्षेत्र में **18%** बढ़ोतरी
- महिला सशक्तिकरण के लिए नई योजनाएँ
- सौर ऊर्जा पर विशेष फोकस

SECTION: प्रैक्टिस प्रश्न

Q: राजस्थान सरकार की नई सौर नीति का लक्ष्य क्या है?
A: 30 GW सौर ऊर्जा उत्पादन

Q: वर्तमान में भारत का GDP वृद्धि दर कितना है?
A: 7.2%</textarea>

    <div class="help">
        <b>Format guide:</b><br>
        <b>SECTION:</b> नया heading<br>
        <b>NEWS:</b> नया news card<br>
        <b>-</b> Bullet points<br>
        <b>Q:</b> / <b>A:</b> Question & Answer
    </div>

    <div class="btn-row">
        <button class="btn primary" onclick="window.print()">🖨️ Print / Save PDF</button>
        <button class="btn secondary" onclick="downloadHTML()">⬇️ Download HTML</button>
    </div>
</div>

<div class="preview-wrap">
    <div class="page" id="page">
        <div class="corner-accent tl"></div>
        <div class="corner-accent tr"></div>
        <div class="corner-accent bl"></div>
        <div class="corner-accent br"></div>

        <div class="header">
            <div class="main-title">समसामयिकी</div>
            <div class="subtitle" id="subtitleOut">JUNE 2026 • PART - 2</div>
        </div>

        <div id="bodyOut"></div>

        <div class="footer" id="footerOut">KULDEEP BISHNOI • RAS PRE + MAINS PREPARATION</div>
    </div>
</div>

<script>
function escapeHTML(str){
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function inlineBold(str){
    return escapeHTML(str).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
}

function render(){
    const raw = document.getElementById('rawInput').value;
    const lines = raw.split('\n');
    let html = '';
    let qNum = 0;
    let newsOpen = false;
    let qOpen = false;

    function closeNews(){ if(newsOpen){ html += `</ul></div>`; newsOpen = false; } }
    function closeQuestion(){ if(qOpen){ html += `</div>`; qOpen = false; } }

    lines.forEach(line=>{
        const t = line.trim();
        if(t === '') return;

        if(t.startsWith('SECTION:')){
            closeNews(); closeQuestion();
            html += `<div class="section-title">${escapeHTML(t.replace('SECTION:','').trim())}</div>`;
        }
        else if(t.startsWith('NEWS:')){
            closeNews(); closeQuestion();
            html += `<div class="news-item"><h3>${escapeHTML(t.replace('NEWS:','').trim())}</h3><ul class="news-list">`;
            newsOpen = true;
        }
        else if(t.startsWith('-')){
            html += `<li>${inlineBold(t.replace(/^-/, '').trim())}</li>`;
        }
        else if(t.startsWith('Q:')){
            closeNews(); closeQuestion();
            qNum++;
            html += `<div class="question"><div class="q-number">\( {String(qNum).padStart(2,'0')}</div><p class="q-text"> \){inlineBold(t.replace('Q:','').trim())}</p>`;
            qOpen = true;
        }
        else if(t.startsWith('A:')){
            html += `<div class="a-pill"><b>उत्तर:</b> ${inlineBold(t.replace('A:','').trim())}</div>`;
        }
    });
    closeNews(); closeQuestion();

    document.getElementById('bodyOut').innerHTML = html;
    document.getElementById('subtitleOut').textContent = document.getElementById('subtitleInput').value;
    document.getElementById('footerOut').textContent = document.getElementById('footerInput').value;
}

function downloadHTML(){
    const pageHTML = document.getElementById('page').outerHTML;
    const styles = document.querySelector('style').outerHTML;
    const doc = `<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><title>समसामयिकी</title>\( {styles}</head><body style="background:#eee6d4;display:flex;justify-content:center;padding:30px;"> \){pageHTML}</body></html>`;
    const blob = new Blob([doc], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'samasamayiki-bulletin.html';
    a.click();
    URL.revokeObjectURL(url);
}

document.getElementById('rawInput').addEventListener('input', render);
document.getElementById('subtitleInput').addEventListener('input', render);
document.getElementById('footerInput').addEventListener('input', render);
render();
</script>

</body>
</html>
